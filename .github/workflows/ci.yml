name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: pnpm install --registry https://registry.npmjs.org

      - name: Build
        run: bun run build.ts

      - name: Verify version
        run: bun dist/cli.js --version

      - name: Run integration tests
        run: bun test tests/integration/print-basic.test.ts

      - name: Test doctor command
        run: CLAUDE_ANY_PROFILE=openai OPENAI_API_KEY=test bun dist/cli.js doctor
